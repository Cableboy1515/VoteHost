<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --vh-ink:oklch(0.18 0.012 255);
  --vh-muted:oklch(0.52 0.008 255);
  --vh-line:oklch(0.92 0.006 250);
  --vh-line-strong:oklch(0.86 0.008 250);
  --vh-bg:oklch(0.985 0.003 250);
  --vh-surface-3:oklch(0.945 0.006 250);
  --vh-accent:#3F66D9;
  --vh-danger:oklch(0.58 0.20 25);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Geist',ui-sans-serif,system-ui,sans-serif;background:var(--vh-bg);color:var(--vh-ink);letter-spacing:-0.005em;line-height:1.5;padding:28px;max-width:480px}
.field{margin-bottom:20px}
label{display:block;font-size:14px;font-weight:500;margin-bottom:6px}
.input,textarea{width:100%;height:32px;padding:4px 10px;font:inherit;font-size:14px;color:var(--vh-ink);background:transparent;border:1px solid var(--vh-line-strong);border-radius:14px;outline:none;transition:border-color .15s,box-shadow .15s}
.input::placeholder,textarea::placeholder{color:var(--vh-muted)}
.input:focus,textarea:focus{border-color:var(--vh-accent);box-shadow:0 0 0 3px rgba(63,102,217,.3)}
.input-focus{border-color:var(--vh-accent);box-shadow:0 0 0 3px rgba(63,102,217,.3)}
.input-invalid{border-color:var(--vh-danger);box-shadow:0 0 0 3px color-mix(in srgb,var(--vh-danger) 20%,transparent)}
.input:disabled{pointer-events:none;cursor:not-allowed;background:color-mix(in srgb,var(--vh-line-strong) 50%,transparent);opacity:.5}
textarea{height:auto;min-height:84px;padding:8px 10px;resize:vertical;line-height:1.5}
.hint{font-size:13px;color:var(--vh-muted);margin-top:6px}
.error{font-size:13px;color:var(--vh-danger);margin-top:6px}
</style>
</head>
<body>
  <div class="field">
    <label for="name">Election name</label>
    <input class="input" id="name" placeholder="Annual Board Election 2026">
  </div>

  <div class="field">
    <label for="email">Focused</label>
    <input class="input input-focus" id="email" type="email" value="chair@example.org">
  </div>

  <div class="field">
    <label for="bad">Invalid</label>
    <input class="input input-invalid" id="bad" value="not-an-email">
    <p class="error">Enter a valid email address.</p>
  </div>

  <div class="field">
    <label for="off">Disabled</label>
    <input class="input" id="off" value="Locked after activation" disabled>
  </div>

  <div class="field">
    <label for="desc">Description</label>
    <textarea id="desc" placeholder="Shown to voters at the top of the ballot…"></textarea>
    <p class="hint">Optional. Plain text only.</p>
  </div>
</body>
</html>
